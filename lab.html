<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>组件Lab · 整页可切换</title>
<style>
  :root{
    --bg:#fafaff; --ink:#181425; --sub:#6b6785; --card:rgba(255,255,255,.65); --line:rgba(24,20,37,.1);
    --i1:#6366f1; --i2:#a855f7; --i3:#ec4899; --i4:#06b6d4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--bg);color:var(--ink);font-family:ui-sans-serif,-apple-system,"Segoe UI",sans-serif;overflow-x:hidden;}
  .mono{font-family:ui-monospace,"Cascadia Code","SF Mono",Consolas,monospace;}
  .grad-text{background:linear-gradient(90deg,var(--i1),var(--i3));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .glass{background:var(--card);border:1px solid var(--line);backdrop-filter:blur(16px);border-radius:18px;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 30px;}

  .zone{position:relative;}
  .switcher{
    position:absolute;top:10px;right:10px;z-index:20;display:flex;align-items:center;gap:6px;
    background:var(--ink);color:#fff;border-radius:999px;padding:6px 6px 6px 12px;font-size:11px;font-weight:700;
    box-shadow:0 8px 20px rgba(24,20,37,.25);opacity:.55;transition:opacity .2s;
  }
  .zone:hover .switcher{opacity:1;}
  .switcher .lbl{font-family:ui-monospace,monospace;}
  .switcher button{width:24px;height:24px;border-radius:50%;border:none;background:rgba(255,255,255,.18);color:#fff;cursor:pointer;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .switcher button:hover{background:linear-gradient(90deg,var(--i1),var(--i3));}
  .zone-tag{position:absolute;top:12px;left:14px;z-index:20;font-size:9.5px;font-weight:800;letter-spacing:.06em;color:var(--i2);background:rgba(255,255,255,.85);padding:3px 9px;border-radius:999px;opacity:.7;}

  header.top{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:18px 30px;background:rgba(250,250,255,.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);}
  .mark{font-weight:800;font-size:15px;}
  .mark span{background:linear-gradient(90deg,var(--i1),var(--i3));-webkit-background-clip:text;background-clip:text;color:transparent;}

  section.sec{padding:50px 0;position:relative;}
  .sechead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px;}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;}
  h2.h2{font-size:24px;font-weight:800;margin:6px 0 0;}

  .n1{display:inline-flex;gap:4px;padding:5px;border-radius:999px;}
  .n1 a{font-size:12.5px;padding:9px 17px;border-radius:999px;font-weight:600;color:var(--sub);cursor:pointer;}
  .n1 a.on{background:linear-gradient(90deg,var(--i1),var(--i3));color:#fff;}
  .n2{display:flex;gap:24px;}
  .n2 a{font-size:13px;font-weight:600;color:var(--sub);padding-bottom:4px;border-bottom:2px solid transparent;cursor:pointer;}
  .n2 a.on{color:var(--ink);border-color:var(--i2);}
  .n4{display:inline-flex;gap:6px;padding:6px;border-radius:16px;box-shadow:0 10px 24px rgba(99,102,241,.15);}
  .n4 a{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--sub);cursor:pointer;}
  .n4 a.on{background:linear-gradient(135deg,var(--i1),var(--i3));color:#fff;}
  .n5{display:flex;gap:18px;}
  .n5 a{font-size:12.5px;font-weight:700;color:var(--sub);cursor:pointer;}
  .n5 a.on{color:transparent;background:linear-gradient(90deg,var(--i1),var(--i3));-webkit-background-clip:text;background-clip:text;}

  .hv1{text-align:center;padding:56px 0 10px;}
  .hv1 h2{font-size:44px;font-weight:800;margin:16px 0;}
  .hv1 .pill{display:inline-flex;gap:8px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:12px;font-weight:600;}
  .hv1 .dot{width:7px;height:7px;border-radius:50%;background:var(--i2);}
  .hv2{display:flex;align-items:center;gap:30px;padding:40px 0;}
  .hv2 .txt{flex:1;}
  .hv2 h2{font-size:34px;font-weight:800;margin:0;}
  .hv2 .orb{width:170px;height:170px;border-radius:50%;flex-shrink:0;background:conic-gradient(var(--i1),var(--i2),var(--i3),var(--i4),var(--i1));animation:spin 8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .hv3{position:relative;border-radius:20px;overflow:hidden;padding:60px 30px;background:linear-gradient(135deg,#eef0ff,#fdeef9);text-align:center;}
  .hv4{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;padding:40px 0;}
  .hv4 h2{font-size:32px;font-weight:800;margin:6px 0 0;}
  .hv4-badge{padding:12px 18px;border-radius:12px;font-size:11px;font-weight:700;text-align:center;}
  .hv4-badge .n{font-size:20px;display:block;}

  .s1{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:820px;margin:0 auto;}
  .s1-item{padding:20px 12px;text-align:center;}
  .s1-item .n{font-size:26px;font-weight:800;}
  .s1-item .l{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;}
  .s2{display:flex;gap:24px;overflow-x:auto;padding:16px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .s2-item{flex-shrink:0;text-align:center;padding:0 16px;}
  .s2-item .n{font-size:20px;font-weight:800;}
  .s3{display:flex;gap:22px;justify-content:center;}
  .ring{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;}
  .ring::before{content:"";position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--i2) 0 70%, var(--line) 70% 100%);}
  .ring span{position:relative;background:var(--bg);width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
  .s5{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .s5-item{padding:16px;display:flex;align-items:center;gap:10px;}
  .s5-item .ic{width:32px;height:32px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,var(--i1),var(--i3));}
  .s5-item .n{font-size:18px;font-weight:800;}

  .cardgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .c1{padding:20px;}
  .c1 .d{font-size:11px;font-weight:700;margin-bottom:8px;}
  .c1 h3{font-size:15px;margin:0 0 6px;font-weight:800;}
  .c1 p{font-size:12px;color:var(--sub);margin:0;}
  .c2{display:flex;overflow:hidden;padding:0;}
  .c2 .bar{width:6px;background:linear-gradient(180deg,var(--i1),var(--i3));flex-shrink:0;}
  .c2 .body{padding:18px;}
  .c3{overflow:hidden;padding:0;}
  .c3 .top{height:70px;background:linear-gradient(135deg,var(--i2),var(--i4));}
  .c3 .body{padding:16px;}
  .c5{position:relative;padding:22px;overflow:hidden;}
  .c5 .idx{position:absolute;right:8px;top:-6px;font-size:70px;font-weight:900;opacity:.12;}

  .q1{padding:26px;position:relative;overflow:hidden;}
  .q1::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(99,102,241,.1),rgba(236,72,153,.1));z-index:-1;}
  .q1 p{font-size:22px;font-weight:700;margin:0 0 12px;}
  .q4{text-align:center;padding:40px;background:linear-gradient(135deg,#eef0ff,#fdeef9);border-radius:20px;}
  .q4 p{font-size:24px;font-weight:800;max-width:60ch;margin:0 auto 14px;}
  .q3{display:flex;padding:0;overflow:hidden;}
  .q3 .accent{width:5px;background:linear-gradient(180deg,var(--i2),var(--i4));}
  .q3 .body{padding:22px;}

  .iv1{display:flex;gap:20px;align-items:center;padding:22px;}
  .iv1 .av{width:64px;height:64px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--i1),var(--i2),var(--i3));}
  .iv2{text-align:center;padding:30px;}
  .iv2 .av{width:80px;height:80px;border-radius:50%;margin:0 auto 14px;background:linear-gradient(135deg,var(--i1),var(--i2),var(--i3));}
  .iv3{display:grid;grid-template-columns:1fr 1fr;gap:0;overflow:hidden;padding:0;}
  .iv3 .txt{padding:24px;}
  .iv3 .stats{display:flex;flex-direction:column;justify-content:center;gap:14px;padding:24px;background:rgba(99,102,241,.05);}
  .iv3 .stats div{font-size:12px;color:var(--sub);}
  .iv3 .stats b{display:block;font-size:20px;color:var(--ink);}

  .tv1{display:flex;flex-direction:column;gap:2px;}
  .tv1-row{display:flex;justify-content:space-between;padding:14px 18px;border-radius:12px;}
  .tv1-row .yr{font-family:ui-monospace,monospace;font-size:12px;font-weight:700;}
  .tv2{display:flex;gap:20px;overflow-x:auto;padding:16px 4px;}
  .tv2-item{flex-shrink:0;width:150px;padding:16px;text-align:center;}
  .tv2-item .yr{font-family:ui-monospace,monospace;font-weight:800;font-size:16px;}
  .tv3{display:flex;flex-direction:column;gap:16px;}
  .tv3-row{display:flex;gap:16px;align-items:center;}
  .tv3-row.right{flex-direction:row-reverse;text-align:right;}
  .tv3-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--i1),var(--i3));}
  .tv3-card{flex:1;padding:14px 18px;}

  .cov1{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .cov1-item{padding:20px;}
  .cov1-item h3{font-size:15px;margin:0 0 6px;font-weight:800;}
  .cov1-item p{font-size:11.5px;color:var(--sub);margin:0;}
  .cov2{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .cov2-item{padding:14px 22px;border-radius:14px;font-weight:800;font-size:14px;}
  .cov3{display:flex;flex-direction:column;gap:2px;}
  .cov3-row{display:flex;padding:14px 18px;border-radius:10px;gap:14px;align-items:center;}
  .cov3-row .bar{width:4px;height:28px;border-radius:2px;background:linear-gradient(180deg,var(--i1),var(--i3));}

  .ctv1{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  .ctv1-item{padding:20px;display:flex;align-items:center;gap:14px;}
  .ctv1-item .ic{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--i1),var(--i3));flex-shrink:0;}
  .ctv2{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;}
  .ctv2-item{text-align:center;}
  .ctv2-item .ic{width:48px;height:48px;border-radius:50%;margin:0 auto 8px;background:linear-gradient(135deg,var(--i1),var(--i3));}
  .ctv3{display:flex;flex-direction:column;gap:0;}
  .ctv3-row{display:flex;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);}
  .ctv3-row:last-child{border-bottom:none;}

  .pv1{padding:20px;}
  .pv1-row{margin-bottom:16px;}
  .pv1-row:last-child{margin-bottom:0;}
  .pv1-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:7px;}
  .pv1-track{height:8px;border-radius:99px;background:var(--line);overflow:hidden;}
  .pv1-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--i1),var(--i3));}
  .pv2{display:flex;flex-direction:column;gap:14px;}
  .pv2-item{display:flex;align-items:center;gap:14px;padding:14px 18px;}
  .pv2-item .lbl2{width:110px;font-size:12.5px;font-weight:700;flex-shrink:0;}
  .pv2-track{flex:1;height:6px;border-radius:99px;background:var(--line);overflow:hidden;}
  .pv2-fill{height:100%;border-radius:99px;}
  .pv3{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;}
  .pv3-item{text-align:center;}
  .pv3-ring{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;margin:0 auto 8px;}
  .pv3-ring span{position:relative;background:var(--bg);width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}

  .bs1{display:flex;gap:4px;align-items:flex-end;padding:20px;}
  .bs1-spine{width:26px;border-radius:4px 4px 0 0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;color:#fff;font-size:9px;writing-mode:vertical-rl;font-weight:700;}
  .bs2{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .bs2-item{padding:0;overflow:hidden;}
  .bs2-cover{height:70px;}
  .bs2-body{padding:10px;}
  .bs2-body h4{font-size:11.5px;margin:0;font-weight:700;}
  .bs3{display:flex;flex-direction:column;gap:2px;}
  .bs3-row{display:flex;align-items:center;gap:12px;padding:12px 16px;}
  .bs3-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

  .pr1{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .pr1-item{padding:18px;}
  .pr1-item .idx{font-family:ui-monospace,monospace;font-size:11px;font-weight:800;margin-bottom:8px;}
  .pr1-item h4{font-size:13.5px;margin:0;font-weight:800;}
  .pr2{display:flex;gap:14px;overflow-x:auto;padding:4px;}
  .pr2-item{flex-shrink:0;width:200px;padding:16px;}
  .pr3{display:flex;flex-direction:column;gap:0;}
  .pr3-row{display:flex;gap:18px;padding:16px 4px;border-bottom:1px solid var(--line);align-items:baseline;}
  .pr3-row .big{font-size:28px;font-weight:900;opacity:.25;font-family:ui-monospace,monospace;}

  .th1{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px;}
  .th1 span{padding:7px 14px;border-radius:999px;font-size:12px;cursor:pointer;}
  .th1 span.on{background:linear-gradient(90deg,var(--i1),var(--i3));color:#fff;}
  .th2{width:44px;height:44px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}
  .th3{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .th3 span{padding:9px 16px;font-size:12px;cursor:pointer;}
  .th3 span.on{background:var(--ink);color:#fff;}

  .bt1{width:46px;height:46px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 10px 24px rgba(99,102,241,.3);}
  .bt2{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:999px;color:#fff;font-size:12.5px;font-weight:700;box-shadow:0 10px 24px rgba(99,102,241,.3);}
  .bt3{width:52px;height:52px;border-radius:50%;position:relative;display:inline-flex;align-items:center;justify-content:center;}
  .bt3 span{position:relative;background:var(--bg);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;}

  .es1{text-align:center;padding:40px 20px;}
  .es1 .ic{width:56px;height:56px;border-radius:16px;margin:0 auto 16px;background:linear-gradient(135deg,var(--i1),var(--i3));opacity:.5;}
  .es2{text-align:center;padding:44px 20px;}
  .es2 .ic{width:80px;height:80px;border-radius:50%;margin:0 auto 18px;background:linear-gradient(135deg,var(--i1),var(--i2),var(--i3));opacity:.35;}
  .es2 .btn{display:inline-block;margin-top:14px;padding:10px 22px;border-radius:999px;background:var(--ink);color:#fff;font-size:12px;font-weight:700;}
  .es3{text-align:center;padding:24px;font-size:13px;color:var(--sub);}

  .f1-grid{display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:20px;padding:36px 0 20px;}
  .f1-grid h4{font-size:10px;text-transform:uppercase;color:var(--sub);margin:0 0 8px;}
  .f1-grid a{display:block;font-size:12.5px;margin-bottom:6px;cursor:pointer;}
  .f1-bottom{border-top:1px solid var(--line);padding:14px 0;font-size:11px;color:var(--sub);display:flex;justify-content:space-between;}
  .f2{text-align:center;padding:30px 0;}
  .f2 .socials{display:flex;justify-content:center;gap:14px;margin-bottom:10px;}
  .f2 .socials span{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
  .f4{padding:40px;border-radius:20px;background:linear-gradient(135deg,#eef0ff,#fdeef9);text-align:center;margin:20px 0;}
  .f4 .btn{display:inline-block;padding:12px 26px;border-radius:999px;background:var(--ink);color:#fff;font-size:13px;font-weight:700;}
</style>
</head>
<body>

<header class="top zone">
  <div class="switcher"><span class="lbl">导航 1/4</span><button onclick="cycle('nav')">⇄</button></div>
  <div class="mark">NOTES <span>✦ MUSK</span></div>
  <div id="slot-nav"></div>
</header>

<div class="wrap">

  <section class="sec zone" id="zone-intro">
    <div class="zone-tag">关于我</div>
    <div class="switcher"><span class="lbl" id="lbl-intro">1/3</span><button onclick="cycle('intro')">⇄</button></div>
    <div id="slot-intro"></div>
  </section>

  <section class="sec zone" id="zone-hero">
    <div class="zone-tag">HERO</div>
    <div class="switcher"><span class="lbl" id="lbl-hero">1/4</span><button onclick="cycle('hero')">⇄</button></div>
    <div id="slot-hero"></div>
  </section>

  <section class="sec zone" id="zone-stat">
    <div class="zone-tag">数据统计</div>
    <div class="switcher"><span class="lbl" id="lbl-stat">1/4</span><button onclick="cycle('stat')">⇄</button></div>
    <div id="slot-stat"></div>
  </section>

  <section class="sec zone" id="zone-card">
    <div class="zone-tag">文章卡片</div>
    <div class="switcher"><span class="lbl" id="lbl-card">1/4</span><button onclick="cycle('card')">⇄</button></div>
    <div class="sechead"><div><div class="eyebrow grad-text">Essays</div><h2 class="h2">Master Plan</h2></div></div>
    <div id="slot-card"></div>
  </section>

  <section class="sec zone" id="zone-quote">
    <div class="zone-tag">引用块</div>
    <div class="switcher"><span class="lbl" id="lbl-quote">1/3</span><button onclick="cycle('quote')">⇄</button></div>
    <div id="slot-quote"></div>
  </section>

  <section class="sec zone" id="zone-progress">
    <div class="zone-tag">进度条</div>
    <div class="switcher"><span class="lbl" id="lbl-progress">1/3</span><button onclick="cycle('progress')">⇄</button></div>
    <div class="sechead"><div><div class="eyebrow grad-text">Now</div><h2 class="h2">在做的事</h2></div></div>
    <div id="slot-progress"></div>
  </section>

  <section class="sec zone" id="zone-bookshelf">
    <div class="zone-tag">书架</div>
    <div class="switcher"><span class="lbl" id="lbl-bookshelf">1/3</span><button onclick="cycle('bookshelf')">⇄</button></div>
    <div class="sechead"><div><div class="eyebrow grad-text">Reading</div><h2 class="h2">书单</h2></div></div>
    <div id="slot-bookshelf"></div>
  </section>

  <section class="sec zone" id="zone-principle">
    <div class="zone-tag">原则卡片</div>
    <div class="switcher"><span class="lbl" id="lbl-principle">1/3</span><button onclick="cycle('principle')">⇄</button></div>
    <div class="sechead"><div><div class="eyebrow grad-text">Principles</div><h2 class="h2">信条</h2></div></div>
    <div id="slot-principle"></div>
  </section>

  <section class="sec zone" id="zone-util">
    <div class="zone-tag">工具类控件</div>
    <div class="sechead"><div><div class="eyebrow grad-text">Utility</div><h2 class="h2">深浅切换 / 返回顶部 / 空状态</h2></div></div>
    <div style="display:flex;gap:40px;align-items:flex-start;flex-wrap:wrap;">
      <div class="zone" style="position:relative;padding-top:6px">
        <div class="switcher" style="position:static;display:inline-flex;margin-bottom:10px;opacity:1"><span class="lbl" id="lbl-theme">1/3</span><button onclick="cycle('theme')">⇄</button></div>
        <div id="slot-theme"></div>
      </div>
      <div class="zone" style="position:relative;padding-top:6px">
        <div class="switcher" style="position:static;display:inline-flex;margin-bottom:10px;opacity:1"><span class="lbl" id="lbl-backtop">1/3</span><button onclick="cycle('backtop')">⇄</button></div>
        <div id="slot-backtop"></div>
      </div>
      <div class="glass zone" style="position:relative;padding-top:6px;flex:1;min-width:260px">
        <div class="switcher" style="position:static;display:inline-flex;margin-bottom:10px;opacity:1"><span class="lbl" id="lbl-empty">1/3</span><button onclick="cycle('empty')">⇄</button></div>
        <div id="slot-empty"></div>
      </div>
    </div>
  </section>

  <section class="sec zone" id="zone-timeline">
